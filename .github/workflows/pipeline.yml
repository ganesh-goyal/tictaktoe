name: TicTacToe DevSecOps Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: tictaktoe

permissions:
  contents: read

jobs:

# =========================
# 1. SAST JOB
# =========================
  sast:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Bandit
      run: pip install bandit

    # Generate report
    - name: Run Bandit Report
      run: bandit -r . -f json -o sast-report.json || true

    # Upload artifact
    - name: Upload SAST Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sast-report
        path: sast-report.json

    # Fail after upload
    - name: Fail if issues found
      run: bandit -r . -ll || true


# =========================
# 2. SCA JOB
# =========================
  sca:
    name: Dependency Scan (SCA)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Install pip-audit
      run: pip install pip-audit

    # Generate report
    - name: Run pip-audit Report
      run: pip-audit -f json -o sca-report.json || true

    # Upload artifact
    - name: Upload SCA Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sca-report
        path: sca-report.json

    # Fail after upload
    - name: Fail if vulnerabilities found
      run: pip-audit


# =========================
# 3. BUILD JOB
# =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME:latest .


# =========================
# 4. CONTAINER SCAN JOB
# =========================
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME:latest .

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

    # Generate report
    - name: Run Trivy Report
      run: trivy image -f json -o container-report.json $IMAGE_NAME:latest || true

    # Upload artifact
    - name: Upload Container Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: container-report
        path: container-report.json

    # Fail after upload
    - name: Fail on HIGH/CRITICAL
      run: trivy image --exit-code 1 --severity HIGH,CRITICAL $IMAGE_NAME:latest


# =========================
# 5. RUN + TEST JOB
# =========================
  test:
    name: Run & Test Application
    runs-on: ubuntu-latest
    needs: container-scan

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME:latest .

    - name: Run Container
      run: docker run -d -p 5000:5000 $IMAGE_NAME:latest

    - name: Wait for App
      run: sleep 10

    - name: Test Home Endpoint
      run: curl http://localhost:5000

    - name: Test Vulnerable Endpoint
      run: curl "http://localhost:5000/run?cmd=whoami"