name: TicTacToe DevSecOps Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: tictaktoe

permissions:
  contents: read

jobs:

# =========================
# 1. SECRET SCAN JOB
# =========================
  secret-scan:
    name: Secret Scan (Gitleaks + TruffleHog)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # -------------------------
    # GITLEAKS SCAN
    # -------------------------
    - name: Install Gitleaks
      run: |
        wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64.tar.gz
        tar -xvzf gitleaks-linux-amd64.tar.gz
        sudo mv gitleaks /usr/local/bin/

    - name: Run Gitleaks
      run: gitleaks detect --source . --report-path gitleaks-report.json || true

    - name: Upload Gitleaks Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gitleaks-report
        path: gitleaks-report.json

    # -------------------------
    # TRUFFLEHOG SCAN
    # -------------------------
    - name: Install TruffleHog
      run: pip install trufflehog

    - name: Run TruffleHog
      run: trufflehog filesystem . > trufflehog-report.txt || true

    - name: Upload TruffleHog Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trufflehog-report
        path: trufflehog-report.txt

    # -------------------------
    # FAIL LOGIC
    # -------------------------
    - name: Fail if secrets detected
      run: |
        if [ -s gitleaks-report.json ]; then
          echo "Secrets detected by Gitleaks"
          exit 1
        fi


# =========================
# 2. SAST JOB
# =========================
  sast:
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit Report
      run: bandit -r . -f json -o sast-report.json || true

    - name: Upload SAST Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sast-report
        path: sast-report.json

    - name: Fail if issues found
      run: bandit -r . -ll || true


# =========================
# 3. SCA JOB
# =========================
  sca:
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Run pip-audit Report
      run: pip-audit -f json -o sca-report.json || true

    - name: Upload SCA Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sca-report
        path: sca-report.json

    - name: Fail if vulnerabilities found
      run: pip-audit


# =========================
# 4. BUILD JOB
# =========================
  build:
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME:latest .


# =========================
# 5. CONTAINER SCAN
# =========================
  container-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME:latest .

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

    - name: Run Trivy Report
      run: trivy image -f json -o container-report.json $IMAGE_NAME:latest || true

    - name: Upload Container Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: container-report
        path: container-report.json

    - name: Fail on HIGH/CRITICAL
      run: trivy image --exit-code 1 --severity HIGH,CRITICAL $IMAGE_NAME:latest


# =========================
# 6. TEST JOB
# =========================
  test:
    runs-on: ubuntu-latest
    needs: container-scan

    steps:
    - uses: actions/checkout@v3

    - name: Build Image
      run: docker build -t $IMAGE_NAME:latest .

    - name: Run Container
      run: docker run -d -p 5000:5000 $IMAGE_NAME:latest

    - name: Wait
      run: sleep 10

    - name: Test Endpoint
      run: curl http://localhost:5000